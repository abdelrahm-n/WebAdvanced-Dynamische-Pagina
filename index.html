<!DOCTYPE html>
<html lang="nl" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rick & Morty Explorer</title>

  <!-- Google Fonts: cartoony display font + leesbaar body font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/src/css/main.css" />
  <link rel="stylesheet" href="/src/css/components.css" />
  <link rel="stylesheet" href="/src/css/responsive.css" />
</head>
<body>

  <!--HEADER / NAVIGATIE-->
  <header class="site-header" id="site-header">
    <div class="header-inner">

      <!-- Logo -->
      <div class="logo-fallback" id="logo-fallback">
        <span class="logo-rick">RICK</span>
        <span class="logo-amp">&amp;</span>
        <span class="logo-morty">MORTY</span>
      </div>

      <!-- Hoofdnavigatie -->
      <nav class="main-nav" id="main-nav" aria-label="Hoofdnavigatie">
        <button class="nav-btn active" data-section="characters">Personages</button>
        <button class="nav-btn" data-section="episodes">Afleveringen</button>
        <button class="nav-btn" data-section="locations">Locaties</button>
        <button class="nav-btn" data-section="favorites">Favorieten <span class="fav-badge" id="fav-badge">0</span></button>
        <button class="nav-btn" data-section="settings">Instellingen</button>
      </nav>

      <!-- Rechterkant: themaswitch + hamburger -->
      <div class="header-right">
        <button class="theme-btn" id="theme-btn" aria-label="Wissel thema" title="Wissel thema">
          <span id="theme-label">Licht</span>
        </button>
        <button class="hamburger" id="hamburger" aria-label="Menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>

    </div>

    <!-- Mobiel navigatiemenu -->
    <div class="mobile-menu" id="mobile-menu" aria-hidden="true">
      <button class="nav-btn mobile-nav-btn" data-section="characters">Personages</button>
      <button class="nav-btn mobile-nav-btn" data-section="episodes">Afleveringen</button>
      <button class="nav-btn mobile-nav-btn" data-section="locations">Locaties</button>
      <button class="nav-btn mobile-nav-btn" data-section="favorites">Favorieten</button>
      <button class="nav-btn mobile-nav-btn" data-section="settings">Instellingen</button>
    </div>
  </header>
